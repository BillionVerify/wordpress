name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  wordpress:
    name: Deploy to WordPress.org
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive plugin version (strip leading "v")
        run: echo "PLUGIN_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Deploy to WordPress.org SVN
        uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2 # 2.3.0
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          # Repo is named "wordpress", so the WP.org slug must be set explicitly.
          SLUG: billionverify-email-validator
          # SVN tag must match readme "Stable tag" (no "v" prefix).
          VERSION: ${{ env.PLUGIN_VERSION }}
          # Banner/icon/screenshots live here; copied to SVN /assets, not the zip.
          ASSETS_DIR: .wordpress-org/assets
          # trunk contents are filtered by .gitattributes export-ignore rules.

  github-release:
    name: Attach zip to GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          version="${GITHUB_REF_NAME#v}"
          # git archive honours .gitattributes export-ignore, so dev files
          # (.wp-test, .github, .gitignore, .gitattributes) are excluded and
          # everything is wrapped in the plugin slug folder.
          git archive --format=zip \
            --prefix="billionverify-email-validator/" \
            -o "billionverify-email-validator-${version}.zip" \
            "${GITHUB_REF_NAME}"
          echo "ASSET=billionverify-email-validator-${version}.zip" >> "$GITHUB_ENV"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${ASSET}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${ASSET}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
